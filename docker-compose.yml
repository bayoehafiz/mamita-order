services:
  mamita-order:
    image: ghcr.io/bayoehafiz/mamita-order:latest
    container_name: mamita-order
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    build:
      context: .
      args:
        SUPABASE_URL: ${SUPABASE_URL}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
        SUPABASE_PORTAL_TABLE: ${SUPABASE_PORTAL_TABLE}
        SUPABASE_PORTAL_STATE_ID: ${SUPABASE_PORTAL_STATE_ID}
        SUPABASE_SCHEMA: ${SUPABASE_SCHEMA}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SUPABASE_PORTAL_TABLE: ${NEXT_PUBLIC_SUPABASE_PORTAL_TABLE}
        NEXT_PUBLIC_SUPABASE_SCHEMA: ${NEXT_PUBLIC_SUPABASE_SCHEMA}

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.docker/config.json:/config.json:ro
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_LABEL_ENABLE=false
      - WATCHTOWER_SCOPE=ghcr
    command: --scope ghcr mamita-order
